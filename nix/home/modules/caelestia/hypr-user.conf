unbind = Super, Super_L
unbind = Super, catchall

bind = SUPER      , RETURN, exec, ghostty
bind = SUPER      , B     , exec, brave
bind = SUPER      , E     , exec, nautilus
bind = SUPER      , P     , global, caelestia:launcher
bind = SUPER CTRL , R     , exec, hyprctl reload
bind = SUPER CTRL , Q     , global, caelestia:session
bind = SUPER      , V     , exec, pkill fuzzel || caelestia clipboard
bind = SUPER CTRL , L     , global, caelestia:lock
bind =            , PRINT , exec, caelestia screenshot
bind = SUPER      , PRINT , global, caelestia:screenshotClip
bind = SUPER SHIFT, PRINT , global, caelestia:screenshotFreeze

bind = SUPER      , Q     , killactive
bind = SUPER SHIFT, Q     , exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill
bind = SUPER      , F     , fullscreen, 0
bind = SUPER      , T     , togglefloating
bind = SUPER      , S     , layoutmsg, togglesplit
bind = SUPER SHIFT, D     , layoutmsg, swapsplit
bind = SUPER      , left  , movefocus, l
bind = SUPER      , right , movefocus, r
bind = SUPER      , up    , movefocus, u
bind = SUPER      , down  , movefocus, d
bind = SUPER      , H     , movefocus, l
bind = SUPER      , J     , movefocus, d
bind = SUPER      , K     , movefocus, u
bind = SUPER      , L     , movefocus, r
bind = SUPER SHIFT, left  , resizeactive, -100 0
bind = SUPER SHIFT, down  , resizeactive, 0 100
bind = SUPER SHIFT, up    , resizeactive, 0 -100
bind = SUPER SHIFT, right , resizeactive, 100 0
bind = SUPER SHIFT, H     , resizeactive, -100 0
bind = SUPER SHIFT, J     , resizeactive, 0 100
bind = SUPER SHIFT, K     , resizeactive, 0 -100
bind = SUPER SHIFT, L     , resizeactive, 100 0
bind = SUPER ALT  , left  , swapwindow, l
bind = SUPER ALT  , down  , swapwindow, d
bind = SUPER ALT  , up    , swapwindow, u
bind = SUPER ALT  , right , swapwindow, r
bind = SUPER ALT  , H     , swapwindow, l
bind = SUPER ALT  , J     , swapwindow, d
bind = SUPER ALT  , K     , swapwindow, u
bind = SUPER ALT  , L     , swapwindow, r

bind = SUPER      , 1  , workspace, 1
bind = SUPER      , 2  , workspace, 2
bind = SUPER      , 3  , workspace, 3
bind = SUPER      , 4  , workspace, 4
bind = SUPER      , 5  , workspace, 5
bind = SUPER      , 6  , workspace, 6
bind = SUPER      , 7  , workspace, 7
bind = SUPER      , 8  , workspace, 8
bind = SUPER      , 9  , workspace, 9
bind = SUPER      , 0  , workspace, 10
bind = SUPER SHIFT, 1  , movetoworkspace, 1
bind = SUPER SHIFT, 2  , movetoworkspace, 2
bind = SUPER SHIFT, 3  , movetoworkspace, 3
bind = SUPER SHIFT, 4  , movetoworkspace, 4
bind = SUPER SHIFT, 5  , movetoworkspace, 5
bind = SUPER SHIFT, 6  , movetoworkspace, 6
bind = SUPER SHIFT, 7  , movetoworkspace, 7
bind = SUPER SHIFT, 8  , movetoworkspace, 8
bind = SUPER SHIFT, 9  , movetoworkspace, 9
bind = SUPER SHIFT, 0  , movetoworkspace, 10
bind = SUPER      , TAB, workspace, m+1
bind = SUPER SHIFT, TAB, workspace, m-1

bind = , XF86MonBrightnessUp  , global, caelestia:brightnessUp
bind = , XF86MonBrightnessDown, global, caelestia:brightnessDown
bind = , XF86AudioRaiseVolume , exec, pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume , exec, pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute        , exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute     , exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = , XF86AudioPlay        , global, caelestia:mediaToggle
bind = , XF86AudioPause       , global, caelestia:mediaToggle
bind = , XF86AudioNext        , global, caelestia:mediaNext
bind = , XF86AudioPrev        , global, caelestia:mediaPrev
bind = , XF86Lock             , global, caelestia:lock

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop
